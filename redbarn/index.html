<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Red Barn Redirect</title>
<script>
const lat = 27.483630347438837;
const lng = -82.56185374648253;

const ua = navigator.userAgent.toLowerCase();

if (ua.includes("iphone") || ua.includes("ipad") || (ua.includes("macintosh") && "ontouchend" in document)) {
    window.location = `maps://?daddr=${lat},${lng}&dirflg=d`;
} else {
    window.location = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
}
</script>
</head>
<body>
Redirecting...
</body>
</html>
