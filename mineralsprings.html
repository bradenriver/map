<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mineral Springs Park Redirect</title>

<script>
const lat = 27.49836620735181;
const lng = -82.54962971586501;

const ua = navigator.userAgent.toLowerCase();

if (ua.includes("iphone") || ua.includes("ipad") || (ua.includes("macintosh") && "ontouchend" in document)) {
    window.location.href = `http://maps.apple.com/?daddr=${lat},${lng}`;
} else {
    window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
}
</script>

</head>
<body>
Redirecting...
</body>
</html>
